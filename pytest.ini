[pytest]
pythonpath = .

addopts = --reruns 1 --reruns-delay 5
filterwarnings =
    ignore:Module already imported so cannot be rewritten; anyio:pytest.PytestAssertRewriteWarning
    ignore:Module already imported so cannot be rewritten; deepeval:pytest.PytestAssertRewriteWarning
markers =
    sanity: Quick smoke checks
    llm_eval: Tests specific to LLM evaluation
    rule_eval: Tests specific to rule-based evaluation
    dev: Tests suitable for dev environment
    uat: Tests suitable for UAT environment
    regression: Full regression suite
